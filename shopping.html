<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXE Vietnam | Cửa hàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ccff00', dark: '#0a0a0a', card: '#111111' }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; } ::-webkit-scrollbar-track { background: #0a0a0a; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; } ::-webkit-scrollbar-thumb:hover { background: #ccff00; } ::selection { background-color: #ccff00; color: #000; }
        .modal-active { display: flex !important; animation: fadeIn 0.3s ease; } @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-dark text-white font-sans antialiased overflow-x-hidden">

    <div class="bg-primary text-black text-center py-2 text-xs md:text-sm font-bold tracking-widest uppercase z-50 relative">⚡ Freeship toàn quốc cho đơn hàng từ 199.000₫ ⚡</div>

    <nav id="navbar" class="fixed w-full z-40 transition-all duration-300 bg-dark/95 backdrop-blur-md border-b border-neutral-800 py-4 px-6 md:px-12 flex justify-between items-center top-[32px] md:top-[36px]">
        <a href="index.html" class="text-2xl font-black tracking-wider flex items-center gap-2 text-white"><span class="text-primary text-3xl">/</span>AXE</a>
        <div class="hidden md:flex gap-8 text-sm font-bold uppercase tracking-widest text-neutral-400">
            <a href="index.html" class="hover:text-primary transition-colors">Trang chủ</a>
            <a href="shopping.html" class="text-primary border-b-2 border-primary pb-1">Shopping</a>
            <a href="cv.html" class="hover:text-primary transition-colors">Cá nhân (CV)</a>
        </div>
        <div class="relative group cursor-pointer" onclick="toggleCart()">
            <i class="fa-solid fa-cart-shopping text-xl text-white group-hover:text-primary transition-colors"></i>
            <span id="cart-count" class="absolute -top-2 -right-3 bg-red-600 text-white text-xs font-bold px-1.5 py-0.5 rounded-full shadow-sm">0</span>
        </div>
    </nav>

    <section class="relative pt-40 pb-20 px-6 flex items-center justify-center text-center border-b border-neutral-800 bg-card mt-[-40px]">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1550505098-dfb9671d2b8b?q=80&w=1920&auto=format&fit=crop')] bg-cover bg-center opacity-10 grayscale"></div>
        <div class="relative z-10"><h1 class="text-4xl md:text-5xl font-black uppercase tracking-widest text-white">Cửa Hàng <span class="text-primary">AXE</span></h1><p class="mt-4 text-neutral-400 max-w-xl mx-auto">Chọn vũ khí mùi hương của riêng bạn. Phân cấp đa dạng, từ tiêu chuẩn đến cao cấp.</p></div>
    </section>

    <section id="products" class="py-16 px-6 md:px-12 max-w-7xl mx-auto">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        <div id="pagination" class="flex justify-center items-center gap-3 mt-16"></div>
    </section>

    <footer class="bg-card text-neutral-400 py-12 px-6 text-center border-t border-neutral-900 mt-12"><div class="max-w-4xl mx-auto"><h3 class="text-2xl font-black text-white tracking-widest mb-4"><span class="text-primary">/</span>AXE</h3><div class="text-xs text-neutral-600">&copy; 2026 AXE Store Vietnam. Thiết kế bởi Nguyễn Hoàng Nam.</div></div></footer>

    <div id="overlay" class="fixed inset-0 bg-dark/80 z-50 hidden opacity-0 transition-opacity duration-300" onclick="toggleCart()"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-card shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-neutral-800">
        <div class="flex justify-between items-center p-6 border-b border-neutral-800"><h2 class="text-xl font-black uppercase text-white">Giỏ hàng</h2><button onclick="toggleCart()" class="text-neutral-400 hover:text-red-500 text-2xl"><i class="fa-solid fa-xmark"></i></button></div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 border-t border-neutral-800 bg-dark">
            <div class="flex justify-between items-center mb-6 text-lg font-bold text-white"><span>Tổng tạm tính:</span><span id="cart-total" class="text-primary text-xl">0₫</span></div>
            <button onclick="openCheckout()" class="w-full bg-primary text-black font-black py-4 rounded uppercase hover:bg-white">Tiến Hành Thanh Toán</button>
        </div>
    </div>

    <div id="checkout-modal" class="fixed inset-0 z-[70] hidden items-center justify-center p-4 bg-dark/90 backdrop-blur-sm">
        <div class="bg-card rounded-xl shadow-2xl w-full max-w-md overflow-hidden border border-neutral-800">
            <div class="bg-dark p-6 text-center border-b border-neutral-800"><h2 class="text-2xl font-black text-white uppercase tracking-wider">Nhận Hàng</h2></div>
            <div class="p-6 space-y-4">
                <input type="text" id="cus-name" class="w-full px-4 py-3 bg-dark text-white rounded border border-neutral-700 focus:outline-none focus:border-primary" placeholder="Họ và tên *">
                <input type="tel" id="cus-phone" class="w-full px-4 py-3 bg-dark text-white rounded border border-neutral-700 focus:outline-none focus:border-primary" placeholder="Số điện thoại *">
                <input type="text" id="cus-address" class="w-full px-4 py-3 bg-dark text-white rounded border border-neutral-700 focus:outline-none focus:border-primary" placeholder="Địa chỉ chi tiết *">
                <div class="pt-6 flex gap-3"><button onclick="closeCheckout()" class="flex-1 bg-neutral-800 text-white font-bold py-3 rounded uppercase hover:bg-neutral-700">Hủy</button><button onclick="submitOrder()" class="flex-1 bg-primary text-black font-black py-3 rounded uppercase hover:bg-white">Đặt Hàng</button></div>
            </div>
        </div>
    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem('axeCart')) || [];
        function saveCart() { localStorage.setItem('axeCart', JSON.stringify(cart)); }

        // MẢNG DATA COPY Y HỆT BÊN TRANG CHỦ
        const products = [
            { id: 1, name: "AXE Dark Temptation", price: 95000, oldPrice: 120000, badge: "HOT", img: "image/1.webp", desc: "Bản Tiêu Chuẩn - Hương Sô-cô-la đen" },
            { id: 2, name: "AXE Apollo", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_2.jpg", desc: "Bản Tiêu Chuẩn - Hương Gỗ Đàn Hương & Xô thơm" },
            { id: 3, name: "AXE Black", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_3.jpg", desc: "Bản Tiêu Chuẩn - Hương Cam Bergamot & Tuyết tùng" },
            { id: 4, name: "AXE Gold Temptation", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_4.jpg", desc: "Bản Tiêu Chuẩn - Hương Cam Citrus & Hổ phách" },
            { id: 5, name: "AXE Excite", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_5.jpg", desc: "Bản Tiêu Chuẩn - Hương Dừa & Tiêu đen" },
            { id: 6, name: "AXE Click", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_6.jpg", desc: "Bản Tiêu Chuẩn - Hương Gia Vị & Gỗ Ấm" },
            { id: 7, name: "AXE Musk", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_7.jpg", desc: "Bản Tiêu Chuẩn - Hương Xạ hương cổ điển" },
            { id: 8, name: "AXE Marine", price: 95000, oldPrice: 120000, badge: "", img: "link_anh_8.jpg", desc: "Bản Tiêu Chuẩn - Hương Gió biển mát lạnh" },
            { id: 9, name: "AXE Ice Chill", price: 105000, oldPrice: 135000, badge: "COOL", img: "link_anh_9.jpg", desc: "Bản Tươi Mát - Bạc Hà & Chanh Tuyết" },
            { id: 10, name: "AXE Sport Blast", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_10.jpg", desc: "Bản Thể Thao - Cam quýt dồi dào năng lượng" },
            { id: 11, name: "AXE Charge", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_11.jpg", desc: "Bản Tươi Mát - Thảo mộc & Cam cay" },
            { id: 12, name: "AXE You", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_12.jpg", desc: "Bản Tươi Mát - Hổ phách & Vanilla ấm" },
            { id: 13, name: "AXE Adrenaline", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_13.jpg", desc: "Bản Thể Thao - Xạ hương lạnh & Gừng" },
            { id: 14, name: "AXE Africa", price: 105000, oldPrice: 135000, badge: "BEST", img: "link_anh_14.jpg", desc: "Bản Tươi Mát - Vanilla & Hoa phong lữ" },
            { id: 15, name: "AXE Cool Ocean", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_15.jpg", desc: "Bản Tươi Mát - Bạc Hà hoang dã" },
            { id: 16, name: "AXE Wild Spice", price: 105000, oldPrice: 135000, badge: "", img: "link_anh_16.jpg", desc: "Bản Tươi Mát - Gia vị phương Đông" },
            { id: 17, name: "AXE Anarchy", price: 115000, oldPrice: 150000, badge: "LIMITED", img: "link_anh_17.jpg", desc: "Bản Giới Hạn - Lựu đỏ & Gỗ đàn hương" },
            { id: 18, name: "AXE Peace", price: 115000, oldPrice: 150000, badge: "", img: "link_anh_18.jpg", desc: "Bản Đặc Biệt - Hoa Violet & Cam chanh" },
            { id: 19, name: "AXE Collision", price: 115000, oldPrice: 150000, badge: "", img: "link_anh_19.jpg", desc: "Bản Đột Phá - Da thuộc & Bánh quy" },
            { id: 20, name: "AXE Skate & Roses", price: 115000, oldPrice: 150000, badge: "LIMITED", img: "link_anh_20.jpg", desc: "Bản Giới Hạn - Hoa hồng bụi & Gỗ thông" },
            { id: 21, name: "AXE Aqua Bergamot", price: 125000, oldPrice: 165000, badge: "PREMIUM", img: "link_anh_21.jpg", desc: "Fine Fragrance - Nước hoa tinh dầu Bergamot" },
            { id: 22, name: "AXE Blue Lavender", price: 125000, oldPrice: 165000, badge: "PREMIUM", img: "link_anh_22.jpg", desc: "Fine Fragrance - Oải hương xanh & Bạc Hà mát" },
            { id: 23, name: "AXE Green Geranium", price: 125000, oldPrice: 165000, badge: "PREMIUM", img: "link_anh_23.jpg", desc: "Fine Fragrance - Hoa phong lữ & Gỗ tuyết tùng" },
            { id: 24, name: "AXE Golden Mango", price: 125000, oldPrice: 165000, badge: "PREMIUM", img: "link_anh_24.jpg", desc: "Fine Fragrance - Xoài nhiệt đới & Vanilla" }
        ];

        const itemsPerPage = 8; let currentPage = 1; const totalPages = Math.ceil(products.length / itemsPerPage);

        function renderProducts(page) {
            const productGrid = document.getElementById('product-grid'); productGrid.innerHTML = '';
            const start = (page - 1) * itemsPerPage; const currentProducts = products.slice(start, start + itemsPerPage);

            currentProducts.forEach(product => {
                let badgeHtml = product.badge ? `<div class="absolute top-4 right-4 text-xs font-bold bg-primary text-black px-2 py-1 uppercase rounded z-10">${product.badge}</div>` : '';
                let oldPriceHtml = product.oldPrice ? `<span class="text-neutral-500 line-through text-sm ml-2 font-normal">${product.oldPrice.toLocaleString('vi-VN')}₫</span>` : '';
                productGrid.innerHTML += `
                    <div class="relative bg-dark p-6 rounded-xl border border-neutral-800 hover:border-primary transition-all duration-300 flex flex-col justify-between group">
                        ${badgeHtml}
                        <div>
                            <div class="h-48 w-full mb-6 relative overflow-hidden bg-white/5 rounded flex items-center justify-center">
                                <img src="${product.img}" alt="${product.name}" class="w-full h-full object-contain group-hover:scale-110 transition-transform duration-500 fallback-img">
                                <span class="absolute text-neutral-600 text-xs hidden-if-img-loads">Ảnh sản phẩm ${product.id}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-1">${product.name}</h3>
                            <p class="text-sm text-neutral-500 mb-4 h-10">${product.desc}</p>
                        </div>
                        <div>
                            <div class="text-2xl font-black text-primary mb-4 flex items-end">${product.price.toLocaleString('vi-VN')}₫ ${oldPriceHtml}</div>
                            <button onclick="addToCart(${product.id}, this)" class="w-full bg-neutral-800 text-white font-bold py-3 uppercase rounded hover:bg-primary hover:text-black transition-colors">Thêm vào giỏ</button>
                        </div>
                    </div>`;
            });

            // // document.querySelectorAll('.fallback-img').forEach(img => {
            // //     img.onerror = function() { this.style.display = 'none'; this.nextElementSibling.style.display = 'block'; };
            // });
        }

        function renderPagination() {
            const paginationContainer = document.getElementById('pagination'); paginationContainer.innerHTML = '';
            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button'); btn.innerText = i;
                btn.className = i === currentPage ? "w-10 h-10 flex items-center justify-center rounded bg-primary text-black font-black shadow cursor-default" : "w-10 h-10 flex items-center justify-center rounded bg-card text-white border border-neutral-800 hover:border-primary transition-colors cursor-pointer font-bold";
                btn.onclick = () => { if (i !== currentPage) { currentPage = i; renderProducts(currentPage); renderPagination(); document.getElementById('products').scrollIntoView({ behavior: 'smooth' }); } };
                paginationContainer.appendChild(btn);
            }
        }

        function addToCart(id, btnElement) {
            const product = products.find(p => p.id === id); const existingItem = cart.find(item => item.id === id);
            if (existingItem) existingItem.qty += 1; else cart.push({ ...product, qty: 1 });
            saveCart(); updateCartUI();
            const originalText = btnElement.innerText;
            btnElement.innerText = 'Đã Thêm ✓'; btnElement.classList.replace('bg-neutral-800', 'bg-white'); btnElement.classList.replace('text-white', 'text-black');
            setTimeout(() => { btnElement.innerText = originalText; btnElement.classList.replace('bg-white', 'bg-neutral-800'); btnElement.classList.replace('text-black', 'text-white'); }, 1000);
            if(!document.getElementById('cart-sidebar').classList.contains('translate-x-0')) toggleCart();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cart-items'); let total = 0, count = 0;
            if(cart.length === 0) { cartItems.innerHTML = '<div class="text-center text-neutral-600 mt-10">Giỏ hàng đang trống.</div>'; } 
            else {
                cartItems.innerHTML = '';
                cart.forEach((item, index) => {
                    total += item.price * item.qty; count += item.qty;
                    cartItems.innerHTML += `
                        <div class="flex items-center gap-4 bg-dark p-3 rounded-lg border border-neutral-800">
                            <div class="w-16 h-16 bg-white/10 rounded flex items-center justify-center overflow-hidden"><img src="${item.img}" class="w-full h-full object-contain p-1" onerror="this.style.display='none'"></div>
                            <div class="flex-1"><h4 class="font-bold text-sm text-white mb-1">${item.name}</h4><div class="text-primary font-bold text-sm">${item.price.toLocaleString('vi-VN')}₫ <span class="text-neutral-500 font-normal">x${item.qty}</span></div></div>
                            <button onclick="removeFromCart(${index})" class="text-neutral-600 hover:text-red-500 p-2"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                });
            }
            document.getElementById('cart-total').innerText = total.toLocaleString('vi-VN') + '₫'; document.getElementById('cart-count').innerText = count;
        }

        function removeFromCart(index) { cart.splice(index, 1); saveCart(); updateCartUI(); }
        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar'); const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('translate-x-full'); sidebar.classList.toggle('translate-x-0');
            if(sidebar.classList.contains('translate-x-0')) { overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10); } 
            else { overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300); }
        }

        function openCheckout() { if (cart.length === 0) return alert("Giỏ hàng đang trống!"); toggleCart(); document.getElementById('checkout-modal').classList.add('modal-active'); }
        function closeCheckout() { document.getElementById('checkout-modal').classList.remove('modal-active'); }
        function submitOrder() {
            const name = document.getElementById('cus-name').value; const phone = document.getElementById('cus-phone').value; const address = document.getElementById('cus-address').value;
            if (!name || !phone || !address) return alert("Vui lòng điền đủ thông tin!");
            alert(`🎉 Đặt hàng thành công!\nCảm ơn ${name}. Đơn hàng sẽ được giao đến ${address}.`);
            cart = []; saveCart(); updateCartUI(); closeCheckout();
            document.getElementById('cus-name').value = ''; document.getElementById('cus-phone').value = ''; document.getElementById('cus-address').value = '';
        }

        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 30) { navbar.classList.add('shadow-md'); navbar.style.top = '0px'; } 
            else { navbar.classList.remove('shadow-md'); navbar.style.top = window.innerWidth < 768 ? '32px' : '36px'; }
        });

        renderProducts(1); renderPagination(); updateCartUI();
    </script>
</body>
</html>
